<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Veeresh</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }
        .modal-content {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 900px;
            border-radius: 12px;
            animation: zoomIn 0.3s;
        }
        @keyframes zoomIn {
            from {transform: scale(0.9); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }
        .close-modal:hover,
        .close-modal:focus {
            color: var(--accent-cyan);
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav-container">
            <div class="logo">Veeresh<span class="gradient-text">.</span></div>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="education.html">Education</a>
                <a href="certifications.html" class="active">Certifications</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="container">
            <div class="page-header fade-in">
                <h1>My <span class="gradient-text">Certifications</span></h1>
                <p>Professional certifications and achievements.</p>
            </div>
            
            <div class="cert-grid">
                <!-- Certificate Placeholder 1 -->
                <div class="cert-card glass-panel fade-in delay-1">
                    <div class="cert-image">
                        <!-- Replace src with your actual certificate image path later -->
                        <img id="cert-img-1" src="https://via.placeholder.com/800x600/1e293b/00f2fe?text=Certificate+Sample" alt="Certificate">
                    </div>
                    <div class="cert-info">
                        <h3>Full Stack Web Development</h3>
                        <p>Issued by Udemy</p>
                        <button class="btn btn-outline view-cert-btn" data-img="https://via.placeholder.com/1200x900/1e293b/00f2fe?text=Certificate+Sample">
                            <i class="fas fa-eye"></i> View Certificate
                        </button>
                    </div>
                </div>

                <!-- Certificate Placeholder 2 -->
                <div class="cert-card glass-panel fade-in delay-2">
                    <div class="cert-image">
                        <i class="fas fa-certificate"></i>
                        <!-- <img src="certificate2.jpeg" alt="Certificate"> -->
                    </div>
                    <div class="cert-info">
                        <h3>AWS Certified Cloud Practitioner</h3>
                        <p>Issued by Amazon Web Services</p>
                        <button class="btn btn-outline view-cert-btn" data-img="https://via.placeholder.com/1200x900/1e293b/4facfe?text=AWS+Certificate">
                            <i class="fas fa-eye"></i> View Certificate
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- The Modal -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <footer>
        <p>&copy; 2026 Veeresh. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Modal Logic for Certificates
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("fullImage");
        const viewBtns = document.querySelectorAll(".view-cert-btn");
        const span = document.getElementsByClassName("close-modal")[0];

        viewBtns.forEach(btn => {
            btn.onclick = function() {
                modal.style.display = "block";
                modalImg.src = this.getAttribute("data-img");
            }
        });

        span.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
